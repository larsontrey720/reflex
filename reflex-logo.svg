<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- White background -->
  <path
    d="M0 0 C337.92 0 675.84 0 1024 0 C1024 337.92 1024 675.84 1024 1024 C686.08 1024 348.16 1024 0 1024 C0 686.08 0 348.16 0 0 Z "
    fill="#FEFEFE"
    transform="translate(0,0)"
  />
  
  <!-- Angular cheetah - side view sprinting -->
  <g transform="translate(150, 200) scale(0.7)">
    <!-- Body - angular geometric shapes -->
    <polygon points="100,400 200,300 400,280 600,300 700,400 600,450 400,460 200,450" fill="#E63946" stroke="#1D3557" stroke-width="4"/>
    
    <!-- Head -->
    <polygon points="600,300 700,280 800,320 780,380 700,400 650,360" fill="#E63946" stroke="#1D3557" stroke-width="4"/>
    
    <!-- Ear -->
    <polygon points="720,280 750,240 770,290" fill="#E63946" stroke="#1D3557" stroke-width="3"/>
    
    <!-- Eye -->
    <circle cx="720" cy="320" r="8" fill="#1D3557"/>
    
    <!-- Neck -->
    <polygon points="600,300 650,280 650,360 600,350" fill="#C9184A"/>
    
    <!-- Front legs -->
    <polygon points="200,450 180,600 220,600 250,480" fill="#1D3557"/>
    <polygon points="300,460 280,620 320,620 350,490" fill="#1D3557"/>
    
    <!-- Back legs - extended in sprint -->
    <polygon points="550,450 600,650 640,650 600,470" fill="#1D3557"/>
    <polygon points="500,460 530,680 570,680 550,480" fill="#1D3557"/>
    
    <!-- Tail -->
    <path d="M100,400 Q50,350 80,280 Q100,250 70,200" fill="none" stroke="#1D3557" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Spots - geometric -->
    <circle cx="250" cy="360" r="12" fill="#1D3557"/>
    <circle cx="320" cy="380" r="10" fill="#1D3557"/>
    <circle cx="400" cy="350" r="14" fill="#1D3557"/>
    <circle cx="480" cy="370" r="11" fill="#1D3557"/>
    <circle cx="550" cy="340" r="9" fill="#1D3557"/>
    
    <!-- Motion lines -->
    <line x1="50" y1="320" x2="120" y2="320" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="360" x2="90" y2="360" stroke="#E63946" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="400" x2="110" y2="400" stroke="#E63946" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Reflex text -->
  <text x="512" y="850" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1D3557" text-anchor="middle">
    REFLEX
  </text>
</svg>