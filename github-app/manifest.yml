name: Reflex Quality Bot
url: https://github.com/larsontrey720/reflex
hook_attributes:
  active: true
  url: https://georgeo.zo.space/api/reflex-webhook
redirect_url: https://github.com/larsontrey720/reflex
setup_url: https://github.com/larsontrey720/reflex#setup
setup_on_update: true
description: Automated code quality checks on every PR. Diagnoses 10 health metrics, posts quality diffs, and suggests fixes.
public: true
default_events:
  - pull_request
  - push
default_permissions:
  contents: read
  pull_requests: write
  issues: write
  checks: write
  statuses: write