# Reflex Configuration
# Generated by setup wizard

project:
  name: reflex
  type: web
  language: javascript

# LLM Provider for autonomous fixes
llm:
  provider: zo
  # model: gpt-5.4  # Uncomment to override

# Quality thresholds (0-100)
thresholds:
  typeIntegrity: 95
  testCoverage: 85
  codeComplexity: 80
  security: 100

# Safety settings
safety:
  autoApproveSafe: true
  maxFilesPerCycle: 5
  requireApproval:
    - typeElimination
    - criticalPathCoverage
    - interfaceExtraction

